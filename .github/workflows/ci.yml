name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python3 -m py_compile nexus_rec.py
      - run: find modules -name "*.py" -print0 | xargs -0 python3 -m py_compile

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - run: python3 -m unittest tests/smoke_tests.py
      - run: python3 nexus_rec.py --check-deps

  pypi-publish:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nexus-rec
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python3 -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
